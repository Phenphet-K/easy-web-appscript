<!-- ===== CONTACT VIEW (Contact.html) ===== -->
<div id="contactView" class="contact-bg" style="padding: 12px 0;">
  <div class="section">
    <div class="section-header">
      <h2 class="section-title">ติดต่อสอบถามข้อมูล</h2>
    </div>

    <div class="contact-grid">
      <!-- Address details column -->
      <div class="contact-info-panel">
        <div class="info-item">
          <div class="info-icon">📍</div>
          <div class="info-details">
            <h4>ที่อยู่สถาบันการศึกษา</h4>
            <p id="contactAddress">กำลังโหลด...</p>
          </div>
        </div>
        <div class="info-item">
          <div class="info-icon">📞</div>
          <div class="info-details">
            <h4>ช่องทางโทรศัพท์</h4>
            <p id="contactPhone">-</p>
          </div>
        </div>
        <div class="info-item">
          <div class="info-icon">✉️</div>
          <div class="info-details">
            <h4>ช่องทางอีเมลติดต่อ</h4>
            <p id="contactEmail">-</p>
          </div>
        </div>

        <!-- OpenStreetMap Frame -->
        <div>
          <h4 style="font-family: 'Mitr', sans-serif; font-size: 1rem; margin-bottom: 8px;">🗺️ แผนที่ที่ตั้งโรงเรียน</h4>
          <div class="map-container">
            <iframe 
              id="contactMapIframe"
              width="100%" 
              height="100%" 
              frameborder="0" 
              scrolling="no" 
              marginheight="0" 
              marginwidth="0" 
              src="https://www.openstreetmap.org/export/embed.html?bbox=100.485%2C13.735%2C100.515%2C13.765&amp;layer=mapnik"
              style="border: 0;">
            </iframe>
          </div>
          <div id="contactMapLinkContainer" style="margin-top: 8px; font-size: 0.85rem; display: none;">
            <a id="contactMapLink" href="#" target="_blank" style="color: var(--gold-dark); text-decoration: underline; font-weight: 600;">
              ↗️ เปิดใน Google Maps (หน้าต่างใหม่)
            </a>
          </div>
        </div>
      </div>

      <!-- Guest Feedback message form -->
      <div class="contact-form-panel">
        <h3>✉️ ส่งข้อความสอบถามเรา</h3>
        <form id="guestContactForm" onsubmit="handleContactSubmit(event)">
          <label style="font-size:0.82rem; font-weight:600; color:var(--text-secondary); display:block; margin-bottom:6px;">ชื่อ-นามสกุลของคุณ *</label>
          <input type="text" id="contactName" class="form-control" placeholder="ระบุชื่อจริงและนามสกุล" required>
          
          <label style="font-size:0.82rem; font-weight:600; color:var(--text-secondary); display:block; margin-bottom:6px;">อีเมลติดต่อกลับ *</label>
          <input type="email" id="contactEmailInput" class="form-control" placeholder="yourname@email.com" required>
          
          <label style="font-size:0.82rem; font-weight:600; color:var(--text-secondary); display:block; margin-bottom:6px;">หัวข้อเรื่องที่ติดต่อ *</label>
          <input type="text" id="contactSubject" class="form-control" placeholder="เช่น การรับสมัครนักเรียนใหม่, ขอความอนุเคราะห์สถานที่" required>
          
          <label style="font-size:0.82rem; font-weight:600; color:var(--text-secondary); display:block; margin-bottom:6px;">รายละเอียดเนื้อหาข้อความ *</label>
          <textarea id="contactMessage" class="form-control" placeholder="พิมพ์ข้อเสนอแนะหรือหัวข้อที่ต้องการสอบถาม..." required></textarea>
          
          <button type="submit" class="btn btn-primary" style="width:100%;">
            📨 ส่งแบบฟอร์มติดต่อ
          </button>
        </form>
      </div>

    </div>
  </div>
</div>
