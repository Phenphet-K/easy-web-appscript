<script>
  // ============================================================
  // เว็บโรงเรียน - javascript.html (Global Scriptsheet)
  // ============================================================
  // Global variables loaded from sheet
  window.siteSettings = {};
  window.allNews = [];
  window.allActivities = [];
  // Helper function to resolve Google Drive URLs to a reliable thumbnail image link
  function resolveImageUrl(url) {
    if (!url) return '';
    // Check if it's a Google Drive link
    if (url.includes('google.com') || url.includes('googleusercontent.com')) {
      let fileId = '';
      // Pattern 1: lh3.googleusercontent.com/d/FILE_ID
      if (url.includes('googleusercontent.com/d/')) {
        const parts = url.split('/d/');
        if (parts[1]) fileId = parts[1].split(/[?=#]/)[0];
      }
      // Pattern 2: id=FILE_ID
      else if (url.includes('id=')) {
        const match = url.match(/[?&]id=([^&]+)/);
        if (match && match[1]) fileId = match[1];
      }
      // Pattern 3: /file/d/FILE_ID/view
      else if (url.includes('/file/d/')) {
        const parts = url.split('/file/d/');
        if (parts[1]) fileId = parts[1].split('/')[0];
      }
      if (fileId) {
        return 'https://drive.google.com/thumbnail?id=' + fileId + '&sz=w1200';
      }
    }
    return url;
  }
  // Hamburger Toggle (Mobile Navigation)
  function toggleMobileMenu() {
    document.getElementById('mobileToggle').classList.toggle('open');
    document.getElementById('navMenu').classList.toggle('open');
  }
  function closeMobileMenu() {
    document.getElementById('mobileToggle').classList.remove('open');
    document.getElementById('navMenu').classList.remove('open');
  }
  window.addEventListener('resize', () => {
    if (window.innerWidth > 768) {
      closeMobileMenu();
    }
  });
  // SPA View switching
  function showView(name) {
    closeMobileMenu();
    // Manage links state
    document.querySelectorAll('nav a').forEach(a => a.classList.remove('active'));
    const activeLink = document.getElementById('link-' + name);
    if (activeLink) activeLink.classList.add('active');
    // Hide all public views
    document.querySelectorAll('#publicSite .page-view').forEach(view => {
      view.style.display = 'none';
    });
    // Show target view
    const targetView = document.getElementById('view-' + name);
    if (targetView) targetView.style.display = 'block';
    // Toggle layout sections
    document.getElementById('publicSite').style.display = 'block';
    document.getElementById('adminPortal').style.display = 'none';
    // Scroll to top
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }
  function openAdminLogin() {
    closeMobileMenu();
    document.getElementById('publicSite').style.display = 'none';
    document.getElementById('adminPortal').style.display = 'block';
    if (typeof resetAdminForms === 'function') {
      resetAdminForms();
    }
    window.scrollTo({ top: 0, behavior: 'instant' });
  }
  function exitAdminPortal() {
    showView('home');
  }
  // Apply Sheet Config Dynamic Styles (CMS Theme Styling Engine)
  function applyDynamicTheme(settings) {
    const root = document.documentElement;
    // Fetch settings or use default fallbacks
    const primary = settings.themeColorPrimary || '#0F172A';
    const secondary = settings.themeColorSecondary || '#1E293B';
    const gold = settings.themeColorGold || '#D4AF37';
    const bg = settings.themeBackgroundColor || '#F8FAFC';
    const fontFamily = settings.themeFontFamily || 'Sarabun';
    const fontSizeBase = settings.themeFontSizeBase || '16px';
    const fontSizeHeading = settings.themeFontSizeHeading || '1.85rem';
    // Set custom properties
    root.style.setProperty('--primary', primary);
    root.style.setProperty('--primary-light', secondary);
    root.style.setProperty('--gold', gold);
    root.style.setProperty('--background', bg);
    root.style.setProperty('--theme-font', `'${fontFamily}', sans-serif`);
    root.style.setProperty('--font-size-base', fontSizeBase);
    root.style.setProperty('--font-size-heading', fontSizeHeading);
    // Dynamically load Google Font if not standard
    const fontNode = document.getElementById('googleFontLinkNode');
    if (fontNode) {
      if (fontFamily && fontFamily !== 'Sarabun' && fontFamily !== 'Mitr') {
        fontNode.innerHTML = `@import url('https://fonts.googleapis.com/css2?family=${fontFamily.replace(/ /g, '+')}:wght@300;400;500;600;700&display=swap');`;
      } else {
        fontNode.innerHTML = '';
      }
    }
  }
  // BATCH DATA INITIALIZATION
  function loadAllData() {
    google.script.run
      .withSuccessHandler(data => {
        try {
          if (!data) throw new Error("ข้อมูลจากเซิร์ฟเวอร์ว่างเปล่า");
          window.siteSettings = data.settings || {};
          window.allNews = data.news || [];
          window.allActivities = data.activities || [];
          window.allEvents = data.events || [];
          window.allBoardMembers = data.board || [];
          window.allUpdates = data.updates || [];
          // 1. Apply Dynamic Styling
          try {
            applyDynamicTheme(window.siteSettings);
          } catch (themeErr) {
            console.error("Theme application failed:", themeErr);
          }
          // 2. Populate Header & Footer layouts
          const name = window.siteSettings.schoolName || 'โรงเรียน';
          const headerSchoolName = document.getElementById('headerSchoolName');
          if (headerSchoolName) headerSchoolName.textContent = name;
          const headerSubtitle = document.getElementById('headerSubtitle');
          if (headerSubtitle) headerSubtitle.textContent = window.siteSettings.schoolSubtitle || '';
          const footerSchoolName = document.getElementById('footerSchoolName');
          if (footerSchoolName) footerSchoolName.textContent = name;
          const footerSchoolName2 = document.getElementById('footerSchoolName2');
          if (footerSchoolName2) footerSchoolName2.textContent = name;
          const footerAddress = document.getElementById('footerAddress');
          if (footerAddress) footerAddress.textContent = window.siteSettings.schoolAddress || '';
          const footerContact = document.getElementById('footerContact');
          if (footerContact) {
            footerContact.textContent =
              [window.siteSettings.contactPhone, window.siteSettings.contactEmail].filter(Boolean).join(' | ');
          }
          document.title = window.siteSettings.siteTitle || name;
          const fbLink = document.getElementById('fbLink');
          if (fbLink && window.siteSettings.facebookUrl) fbLink.href = window.siteSettings.facebookUrl;
          const lineLink = document.getElementById('lineLink');
          if (lineLink && window.siteSettings.lineOaUrl) lineLink.href = window.siteSettings.lineOaUrl;
          const logoWrap = document.getElementById('logoWrap');
          if (logoWrap && window.siteSettings.logoUrl) {
            const img = document.createElement('img');
            img.src = resolveImageUrl(window.siteSettings.logoUrl);
            logoWrap.innerHTML = '';
            logoWrap.appendChild(img);
          }
          // 3. Trigger Subpages Initializations
          if (typeof initHome === 'function') {
            try {
              initHome();
            } catch (homeErr) {
              console.error("initHome failed:", homeErr);
            }
          }
          if (typeof initAbout === 'function') {
            try {
              initAbout();
            } catch (aboutErr) {
              console.error("initAbout failed:", aboutErr);
            }
          }
          if (typeof initUpdates === 'function') {
            try {
              initUpdates();
            } catch (updatesErr) {
              console.error("initUpdates failed:", updatesErr);
            }
          }
          if (typeof initContact === 'function') {
            try {
              initContact();
            } catch (contactErr) {
              console.error("initContact failed:", contactErr);
            }
          }
        } catch (err) {
          console.error("Error in withSuccessHandler:", err);
          showToast("เกิดข้อผิดพลาดในการโหลดข้อมูล: " + err.message);
        }
      })
      .withFailureHandler(err => {
        console.error('getPublicData failed:', err);
        showToast('❌ โหลดข้อมูลไม่สำเร็จ: ' + err.message);
        const headerSchoolName = document.getElementById('headerSchoolName');
        if (headerSchoolName) headerSchoolName.textContent = 'เกิดข้อผิดพลาดการเชื่อมต่อ';
      })
      .getPublicData();
  }
  // Init call on page load
  window.onload = () => {
    document.getElementById('yearTxt').textContent = new Date().getFullYear();
    loadAllData();
    
    // Initialize WordPress-style Classic Editors
    initClassicEditor('newsContent');
    initClassicEditor('updateContent');
    // Set up event listeners for Live Theme Preview once DOM is ready
    setTimeout(() => {
      const previewIds = [
        'set_themeColorPrimary',
        'set_themeColorSecondary',
        'set_themeColorGold',
        'set_themeBackgroundColor',
        'set_themeFontFamily',
        'set_themeFontSizeBase',
        'set_themeFontSizeHeading'
      ];
      previewIds.forEach(id => {
        const el = document.getElementById(id);
        if (el) {
          el.addEventListener('input', () => {
            if (id.includes('Color')) {
              const key = id.replace('set_', '');
              updateColorLabel(key, el.value);
            }
            applyLivePreview();
          });
          el.addEventListener('change', applyLivePreview);
        }
      });
      // Set up click-outside to close listener for message details modal
      const msgModal = document.getElementById('messageDetailsModal');
      if (msgModal) {
        msgModal.addEventListener('click', e => {
          if (e.target === e.currentTarget) closeMessageDetailsModal();
        });
      }
    }, 1000);
  };
  // Global Toast utility
  let toastTimeout;
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(toastTimeout);
    toastTimeout = setTimeout(() => t.classList.remove('show'), 4000);
  }
  /* ============================================================
     HOME COMPONENT JAVASCRIPT
     ============================================================ */
  function initHome() {
    const settings = window.siteSettings;
    const news = window.allNews;
    const acts = window.allActivities;
    // Hero slideshow initialization
    initHeroSlideshow();
    // Calendar rendering
    renderCalendarGrid();
    // Director Message Block
    const homeDirName = document.getElementById('homeDirectorName');
    if (homeDirName) homeDirName.textContent = settings.aboutDirectorName || 'ผอ.สมชาย ใจดี';
    const homeDirRole = document.getElementById('homeDirectorRole');
    if (homeDirRole) homeDirRole.textContent = settings.aboutDirectorRole || 'ผู้อำนวยการโรงเรียน';
    const homeDirMessage = document.getElementById('homeDirectorMessage');
    if (homeDirMessage && settings.aboutDirectorMessage) {
      homeDirMessage.textContent = `"${settings.aboutDirectorMessage}"`;
    }
    const homeDirAvatar = document.getElementById('homeDirectorAvatar');
    if (homeDirAvatar) {
      if (settings.aboutDirectorImageUrl) {
        homeDirAvatar.innerHTML = `<img src="${resolveImageUrl(settings.aboutDirectorImageUrl)}" alt="" style="width:100%; height:100%; object-fit:cover; border-radius:50%;">`;
        homeDirAvatar.style.fontSize = 'initial';
      } else {
        homeDirAvatar.textContent = '👨‍💼';
        homeDirAvatar.style.fontSize = '4.5rem';
      }
    }
    // Render news cards & gallery grids
    renderHomeNews(news);
    renderHomeActivities(acts);
  }
  function renderHomeNews(news) {
    const grid = document.getElementById('newsGrid');
    if (!news.length) {
      grid.innerHTML = '<div class="empty-state"><div class="icon">📰</div><p>ยังไม่มีประกาศข่าวสารในขณะนี้</p></div>';
      return;
    }
    const items = news.slice(0, 6);
    grid.innerHTML = items.map((n, idx) => {
      const firstImg = n.imageUrl ? String(n.imageUrl).split(',')[0].trim() : '';
      return `
      <div class="news-card" onclick="openHomeNewsModal(${idx})">
        <div class="news-card-img">
          ${firstImg ? `<img src="${resolveImageUrl(firstImg)}" alt="${n.title}" loading="lazy">` : '📰'}
        </div>
        <div class="news-card-body">
          <span class="news-category">${n.category || 'ทั่วไป'}</span>
          <h3>${escapeHtmlHome(n.title)}</h3>
          <p>${escapeHtmlHome(n.content || '')}</p>
          <div class="news-meta">
            <span class="news-date">📅 ${formatDateHome(n.date)}</span>
            <span class="news-author">✍️ ${escapeHtmlHome(n.author || '')}</span>
          </div>
        </div>
      </div>
    `;
    }).join('');
  }
  function renderHomeActivities(acts) {
    const grid = document.getElementById('galleryGrid');
    if (!acts.length) {
      grid.innerHTML = '<div class="empty-state"><div class="icon">📷</div><p>ยังไม่มีภาพกิจกรรมลงคลังภาพในขณะนี้</p></div>';
      return;
    }
    const items = acts.slice(0, 8);
    grid.innerHTML = items.map((a, idx) => {
      const firstImg = a.imageUrl ? String(a.imageUrl).split(',')[0].trim() : '';
      return `
      <div class="gallery-item" onclick="openHomeActivityModal(${idx})">
        ${firstImg
          ? `<img src="${resolveImageUrl(firstImg)}" alt="${a.title}" loading="lazy">`
          : '<div class="gallery-placeholder">🖼️</div>'
        }
        <div class="gallery-overlay">
          <h4>${escapeHtmlHome(a.title)}</h4>
          ${a.description ? `<p>${escapeHtmlHome(a.description)}</p>` : ''}
        </div>
      </div>
    `;
    }).join('');
  }
  function openHomeNewsModal(index) {
    const n = window.allNews[index];
    if (!n) return;
    document.getElementById('modalTitle').textContent = n.title;
    document.getElementById('modalCategory').textContent = n.category || 'ทั่วไป';
    document.getElementById('modalAuthor').textContent = '✍️ ' + (n.author || '');
    document.getElementById('modalDate').textContent = '📅 ' + formatDateHome(n.date);
    document.getElementById('modalContent').innerHTML = n.content || '';
    const imgContainer = document.getElementById('modalImgContainer');
    if (imgContainer) {
      if (n.imageUrl) {
        const urls = String(n.imageUrl).split(',').map(u => u.trim()).filter(Boolean);
        if (urls.length > 1) {
          imgContainer.innerHTML = `
          <div class="modal-gallery-slider" id="modalSlider">
            ${urls.map((url, idx) => `
              <div class="modal-slide ${idx === 0 ? 'active' : ''}">
                <img src="${resolveImageUrl(url)}" alt="" loading="lazy">
              </div>
            `).join('')}
            <button class="modal-slider-arrow prev" onclick="moveModalSlide(-1)">❮</button>
            <button class="modal-slider-arrow next" onclick="moveModalSlide(1)">❯</button>
            <div class="modal-slider-dots">
              ${urls.map((_, idx) => `
                <span class="modal-slider-dot ${idx === 0 ? 'active' : ''}" onclick="goToModalSlide(${idx})"></span>
              `).join('')}
            </div>
          </div>
        `;
          window.currentModalSlideIdx = 0;
          window.modalSlidesCount = urls.length;
        } else {
          imgContainer.innerHTML = `<img src="${resolveImageUrl(urls[0])}" class="modal-img" alt="" style="width:100%; display:block;">`;
        }
        imgContainer.style.display = 'block';
      } else {
        imgContainer.style.display = 'none';
      }
    }
    const modal = document.getElementById('newsModal');
    modal.classList.add('open');
    document.body.style.overflow = 'hidden';
  }
  function closeModal() {
    document.getElementById('newsModal').classList.remove('open');
    document.body.style.overflow = '';
  }
  // Click outside modal to close news modal
  setTimeout(() => {
    const m = document.getElementById('newsModal');
    if (m) {
      m.addEventListener('click', e => {
        if (e.target === e.currentTarget) closeModal();
      });
    }
  }, 1000);
  // Home Helpers
  function formatDateHome(d) {
    if (!d) return '';
    try {
      return new Date(d).toLocaleDateString('th-TH', {
        year: 'numeric', month: 'long', day: 'numeric'
      });
    } catch { return d; }
  }
  function escapeHtmlHome(text) {
    if (!text) return '';
    const map = {
      '&': '&amp;',
      '<': '&lt;',
      '>': '&gt;',
      '"': '&quot;',
      "'": '&#039;'
    };
    return String(text).replace(/[&<>"']/g, m => map[m]);
  }
  /* ============================================================
     ABOUT COMPONENT JAVASCRIPT
     ============================================================ */
  function initAbout() {
    const settings = window.siteSettings;
    // History & Vision
    document.getElementById('aboutSchoolHistory').textContent = settings.aboutHistory || 'ยังไม่มีข้อมูลประวัติโรงเรียน';
    document.getElementById('aboutSchoolVision').textContent = settings.aboutVision || 'ยังไม่มีข้อมูลวิสัยทัศน์';
    document.getElementById('aboutSchoolMission').textContent = settings.aboutMission || 'ยังไม่มีข้อมูลพันธกิจ';
    // Render dynamic board/executives
    renderAboutBoard(window.allBoardMembers || []);
  }
  function renderAboutBoard(board) {
    const grid = document.getElementById('aboutBoardGrid');
    if (!grid) return;
    
    if (board.length === 0) {
      grid.innerHTML = '<div style="text-align:center; padding: 40px; color: var(--text-secondary); width:100%;">ยังไม่มีรายนามคณะผู้บริหาร</div>';
      return;
    }
    grid.innerHTML = board.map(b => {
      const avatarHtml = b.imageUrl
        ? `<img src="${resolveImageUrl(b.imageUrl)}" style="width:100%; height:100%; object-fit:cover;">`
        : '👨‍💼';
      return `
        <div class="exec-card">
          <div class="exec-avatar" style="overflow: hidden;">${avatarHtml}</div>
          <div class="exec-name">${escapeHtmlHome(b.name)}</div>
          <div class="exec-role">${escapeHtmlHome(b.role)}</div>
        </div>
      `;
    }).join('');
  }
  /* ============================================================
     CONTACT COMPONENT JAVASCRIPT
     ============================================================ */
  function initContact() {
    const settings = window.siteSettings;
    document.getElementById('contactAddress').textContent = settings.schoolAddress || 'ไม่มีข้อมูลที่อยู่โรงเรียน';
    document.getElementById('contactPhone').textContent = settings.contactPhone || '-';
    document.getElementById('contactEmail').textContent = settings.contactEmail || '-';
    const mapIframe = document.getElementById('contactMapIframe');
    const mapLinkContainer = document.getElementById('contactMapLinkContainer');
    const mapLink = document.getElementById('contactMapLink');
    if (mapIframe && settings.contactMapEmbedUrl) {
      let rawUrl = settings.contactMapEmbedUrl.trim();
      let embedUrl = rawUrl;
      
      // Auto-prefix protocol if missing
      if (embedUrl && embedUrl.indexOf('http') !== 0 && embedUrl.toLowerCase().indexOf('<iframe') === -1) {
        if (embedUrl.indexOf('maps.app.goo.gl') === 0 || 
            embedUrl.indexOf('goo.gl/maps') === 0 || 
            embedUrl.indexOf('google.com') === 0 || 
            embedUrl.indexOf('maps.google') === 0 || 
            embedUrl.indexOf('openstreetmap.org') === 0 ||
            embedUrl.indexOf('www.openstreetmap.org') === 0) {
          embedUrl = 'https://' + embedUrl;
        }
      }
      
      // 1. If it looks like an iframe tag, extract the src URL
      if (embedUrl.toLowerCase().indexOf('<iframe') !== -1) {
        const match = embedUrl.match(/src=["']([^"']+)["']/i);
        if (match && match[1]) {
          embedUrl = match[1];
        }
      }
      
      embedUrl = embedUrl.trim();
      // Show click link if it is a valid web URL
      if (mapLink && mapLinkContainer && (embedUrl.indexOf('http') === 0)) {
        mapLink.href = embedUrl;
        mapLinkContainer.style.display = 'block';
      } else if (mapLinkContainer) {
        mapLinkContainer.style.display = 'none';
      }
      // 2. Parse Google Maps URLs on client-side if they are not already embed URLs
      if (embedUrl.indexOf('/maps/embed') === -1 && embedUrl.indexOf('output=embed') === -1 && embedUrl.indexOf('openstreetmap.org') === -1) {
        // Extract latitude/longitude coordinates
        let latLngMatch = embedUrl.match(/\/search\/([-+]?[0-9.]+),\s*\+?([-+]?[0-9.]+)/i) || 
                           embedUrl.match(/\/place\/([-+]?[0-9.]+),\s*\+?([-+]?[0-9.]+)/i) ||
                           embedUrl.match(/@([-+]?[0-9.]+),([-+]?[0-9.]+)/i) ||
                           embedUrl.match(/[?&]q=([-+]?[0-9.]+),([-+]?[0-9.]+)/i);
                           
        if (latLngMatch && latLngMatch[1] && latLngMatch[2]) {
          embedUrl = 'https://www.google.com/maps/embed?origin=mfe&pb=!1m3!2m1!1s' + latLngMatch[1] + ',' + latLngMatch[2] + '!6i17';
        } else {
          // Extract query place name
          let queryMatch = embedUrl.match(/\/place\/([^/]+)/i) || embedUrl.match(/[?&]q=([^&]+)/i);
          if (queryMatch && queryMatch[1]) {
            embedUrl = 'https://www.google.com/maps/embed?origin=mfe&pb=!1m3!2m1!1s' + queryMatch[1] + '!6i17';
          } else if (embedUrl.match(/^\s*[-+]?[0-9.]+\s*,\s*[-+]?[0-9.]+\s*$/)) {
            embedUrl = 'https://www.google.com/maps/embed?origin=mfe&pb=!1m3!2m1!1s' + encodeURIComponent(embedUrl.trim()) + '!6i17';
          } else if (embedUrl.indexOf('http') === 0) {
            if (embedUrl.indexOf('google.com/maps') !== -1 || embedUrl.indexOf('maps.google.com') !== -1) {
              const qMatch = embedUrl.match(/[?&]q=([^&]+)/i);
              if (qMatch && qMatch[1]) {
                embedUrl = 'https://www.google.com/maps/embed?origin=mfe&pb=!1m3!2m1!1s' + qMatch[1] + '!6i17';
              } else {
                embedUrl = 'https://www.google.com/maps/embed?origin=mfe&pb=!1m3!2m1!1s' + encodeURIComponent(embedUrl) + '!6i17';
              }
            } else if (embedUrl.indexOf('maps.app.goo.gl') !== -1 || embedUrl.indexOf('goo.gl/maps') !== -1) {
              // Fallback to School Address or School Name search query embed for unresolved short links
              const query = (settings.schoolAddress || '').trim() || (settings.schoolName || '').trim();
              if (query && query !== '-' && query !== 'ยังไม่มีข้อมูล') {
                embedUrl = 'https://www.google.com/maps/embed?origin=mfe&pb=!1m3!2m1!1s' + encodeURIComponent(query) + '!6i17';
              } else {
                embedUrl = 'https://www.openstreetmap.org/export/embed.html?bbox=100.485%2C13.735%2C100.515%2C13.765&layer=mapnik';
              }
            }
          } else if (embedUrl) {
            embedUrl = 'https://www.google.com/maps/embed?origin=mfe&pb=!1m3!2m1!1s' + encodeURIComponent(embedUrl) + '!6i17';
          }
        }
      }
      
      mapIframe.src = embedUrl;
    }
  }
  function handleContactSubmit(event) {
    event.preventDefault();
    const name = document.getElementById('contactName').value.trim();
    const email = document.getElementById('contactEmailInput').value.trim();
    const subject = document.getElementById('contactSubject').value.trim();
    const message = document.getElementById('contactMessage').value.trim();
    if (!name || !email || !subject || !message) {
      showToast('⚠️ กรุณากรอกข้อมูลในแบบฟอร์มให้ครบถ้วน');
      return;
    }
    const form = document.getElementById('guestContactForm');
    const btn = form.querySelector('button[type="submit"]');
    const oldHTML = btn.innerHTML;
    btn.innerHTML = '<span class="spinner"></span> กำลังส่งข้อความ...';
    btn.disabled = true;
    google.script.run
      .withSuccessHandler(r => {
        btn.innerHTML = oldHTML;
        btn.disabled = false;
        if (r.success) {
          showToast('📨 ส่งข้อมูลสำเร็จแล้ว! ทีมงานได้รับข้อความและจะติดต่อกลับไปทางอีเมลของท่านโดยเร็ว');
          form.reset();
        } else {
          showToast('❌ ส่งข้อมูลล้มเหลว: ' + r.message);
        }
      })
      .withFailureHandler(err => {
        btn.innerHTML = oldHTML;
        btn.disabled = false;
        showToast('❌ เกิดข้อผิดพลาดทางเทคนิค: ' + err.message);
      })
      .addContactMessage({ name, email, subject, message });
  }
  /* ============================================================

    userEl.classList.remove('is-invalid');

    const user = userEl.value.trim();
    const pass = passEl.value;
    const btn = document.getElementById('loginBtn');

    let valid = true;
    if (!user) { userEl.classList.add('is-invalid'); valid = false; }

    google.script.run

        btn.disabled = false;
        if (r.success) {

    const confirmEl = document.getElementById('confirmPw');
    const oldPw = oldPwEl.value;
    const newPw = newPwEl.value;
    const confirm = confirmEl.value;
    let valid = true;
    if (!oldPw) { setInvalid('oldPw', 'กรุณากรอกรหัสผ่านเดิม'); valid = false; }
    if (!newPw) { setInvalid('newPw', 'กรุณากรอกรหัสผ่านใหม่'); valid = false; }
    if (newPw && newPw.length < 6) { setInvalid('newPw', 'รหัสผ่านใหม่ต้องมีความยาวอย่างน้อย 6 ตัวอักษร'); valid = false; }
    if (newPw !== confirm) { setInvalid('confirmPw', 'รหัสผ่านใหม่สองช่องไม่ตรงกัน'); valid = false; }
    if (!valid) return;
    const btn = document.querySelector('#page-password .btn-primary');
    const oldHTML = btn.innerHTML;
    btn.innerHTML = '<span class="spinner"></span> กำลังบันทึก...';
    btn.disabled = true;
    google.script.run.withSuccessHandler(r => {
      btn.innerHTML = oldHTML;
      btn.disabled = false;

        showToastAdmin('✅ เปลี่ยนแปลงรหัสผ่านผู้ดูแลระบบเรียบร้อย');
        oldPwEl.value = '';

  function escapeHtmlAdmin(text) {

  function moveSlide(dir, count) {
    const slidesCount = count || window.heroSlidesCount || 1;

  function showSlideAt(idx) {

    if (currentSlideIndex < 0) currentSlideIndex = slidesElements.length - 1;
    slidesElements.forEach((s, sIdx) => {
      if (sIdx === currentSlideIndex) s.classList.add('active');

  // Calendar Logic
  let calendarDate = new Date();
  const THAI_MONTHS = [
    'มกราคม', 'กุมภาพันธ์', 'มีนาคม', 'เมษายน', 'พฤษภาคม', 'มิถุนายน',

  function prevMonth() {
    calendarDate.setMonth(calendarDate.getMonth() - 1);
    renderCalendarGrid();
  }
  function nextMonth() {
    calendarDate.setMonth(calendarDate.getMonth() + 1);
    renderCalendarGrid();
  }
  function renderCalendarGrid() {
    const gridBody = document.getElementById('calendarGridBody');
    const monthYearLabel = document.getElementById('calendarMonthYear');
    if (!gridBody || !monthYearLabel) return;
    const year = calendarDate.getFullYear();
    const month = calendarDate.getMonth();
    monthYearLabel.textContent = `${THAI_MONTHS[month]} ${year + 543}`;
    const firstDayIndex = new Date(year, month, 1).getDay();
    const totalDays = new Date(year, month + 1, 0).getDate();
    const events = window.allEvents || [];
    gridBody.innerHTML = '';
    let html = '<tr>';
    for (let i = 0; i < firstDayIndex; i++) {
      html += '<td class="empty-cell"></td>';
    }
    let colIndex = firstDayIndex;
    for (let day = 1; day <= totalDays; day++) {
      if (colIndex === 7) {
        html += '</tr><tr>';
        colIndex = 0;
      }
      const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
      const dayEvents = events.filter(e => {
        if (!e.eventDate) return false;
        const eDate = new Date(e.eventDate);
        if (isNaN(eDate.getTime())) return false;
        return eDate.getFullYear() === year && eDate.getMonth() === month && eDate.getDate() === day;
      });
      let cellClasses = [];
      const today = new Date();
      if (today.getFullYear() === year && today.getMonth() === month && today.getDate() === day) {
        cellClasses.push('today');
      }
      if (dayEvents.length > 0) {
        cellClasses.push('has-event');
        const color = dayEvents[0].color || 'blue';
        cellClasses.push(`event-${color}`);
      }
      if (window.selectedCalendarDateStr === dateStr) {
        cellClasses.push('selected');
      }
      const classAttr = cellClasses.length > 0 ? ` class="${cellClasses.join(' ')}"` : '';
      html += `<td${classAttr} onclick="selectCalendarDate('${dateStr}')">${day}</td>`;
      colIndex++;
    }
    while (colIndex < 7) {
      html += '<td class="empty-cell"></td>';
      colIndex++;
    }
    html += '</tr>';
    gridBody.innerHTML = html;
    renderEventsTimeline();
  }
  function selectCalendarDate(dateStr) {

  function renderEventsTimeline() {
    const container = document.getElementById('upcomingEventsList');
    if (!container) return;
    const events = window.allEvents || [];
    let filtered = events;
    if (window.selectedCalendarDateStr) {
      const targetDate = new Date(window.selectedCalendarDateStr);
      filtered = events.filter(e => {
        if (!e.eventDate) return false;
        const eDate = new Date(e.eventDate);
        if (isNaN(eDate.getTime())) return false;
        return eDate.getFullYear() === targetDate.getFullYear() &&
          eDate.getMonth() === targetDate.getMonth() &&
          eDate.getDate() === targetDate.getDate();
      });
    } else {
      const today = new Date();
      today.setHours(0, 0, 0, 0);
      filtered = events.filter(e => {
        if (!e.eventDate) return false;
        const eDate = new Date(e.eventDate);
        if (isNaN(eDate.getTime())) return false;
        return eDate >= today;
      });
    }
    if (filtered.length === 0) {
      container.innerHTML = `
      <div class="empty-state" style="padding:30px;">
        <p>${window.selectedCalendarDateStr ? 'ไม่มีกิจกรรมในวันที่ระบุ' : 'ไม่มีกิจกรรมที่กำลังจะเกิดขึ้นเร็วๆ นี้'}</p>
      </div>
    `;
      return;
    }
    filtered.sort((a, b) => {
      const ad = new Date(a.eventDate);
      const bd = new Date(b.eventDate);
      const at = isNaN(ad.getTime()) ? 0 : ad.getTime();
      const bt = isNaN(bd.getTime()) ? 0 : bd.getTime();
      return at - bt;
    });
    container.innerHTML = filtered.map(e => {
      const dateObj = new Date(e.eventDate);
      let day = '📅';
      let month = 'กิจกรรม';
      if (!isNaN(dateObj.getTime())) {
        day = dateObj.getDate();
        month = dateObj.toLocaleDateString('th-TH', { month: 'short' });
      }
      const color = e.color || 'blue';
      return `
      <div class="timeline-item" onclick="openEventDetailModal('${e.id}')">
        <div class="timeline-date-badge ${color}">
          <span class="timeline-date-day">${day}</span>
          <span class="timeline-date-month">${month}</span>
        </div>
        <div class="timeline-info">
          <h4>${escapeHtmlHome(e.title)}</h4>
          <p>${escapeHtmlHome(e.description || '')}</p>
          <div class="timeline-meta">
            ${e.time ? `<span>⏰ ${escapeHtmlHome(e.time)}</span>` : ''}
            ${e.location ? `<span>📍 ${escapeHtmlHome(e.location)}</span>` : ''}
          </div>
        </div>
      </div>
    `;
    }).join('');
  }

  function updateUnreadBadge(messages) {
    const unreadCount = messages.filter(m => m.status === 'unread').length;
    const badge = document.getElementById('unreadMessagesBadge');
    if (badge) {
      if (unreadCount > 0) {
        badge.textContent = unreadCount;
        badge.style.display = 'inline-block';
      } else {
        badge.style.display = 'none';
      }
    }
  }
  function filterMessages() {
    const search = document.getElementById('messagesSearchInput').value.toLowerCase().trim();
    const filter = document.getElementById('messagesStatusFilter').value;
    
    let filtered = window.allMessages;
    
    if (filter !== 'all') {
      filtered = filtered.filter(m => m.status === filter);
    }
    
    if (search) {
      filtered = filtered.filter(m => 
        (m.name || '').toLowerCase().includes(search) || 
        (m.email || '').toLowerCase().includes(search) || 
        (m.subject || '').toLowerCase().includes(search) ||
        (m.message || '').toLowerCase().includes(search)
      );
    }
    
    renderMessagesTable(filtered);
  }
  function renderMessagesTable(messages) {
    const tbody = document.getElementById('messagesTableBody');
    if (!messages.length) {
      tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;padding:40px;color:#aaa;">ไม่พบข้อความติดต่อสอบถาม</td></tr>';
      return;
    }
    
    tbody.innerHTML = messages.map(m => {
      let statusBadge = '';
      if (m.status === 'unread') {
        statusBadge = '<span class="status-badge draft" style="background:#EF4444;color:white;">🔴 ยังไม่ได้อ่าน</span>';
      } else if (m.status === 'read') {
        statusBadge = '<span class="status-badge published" style="background:#10B981;color:white;">🟢 อ่านแล้ว</span>';
      } else if (m.status === 'replied') {
        statusBadge = '<span class="status-badge" style="background:#3B82F6;color:white;padding:3px 8px;border-radius:12px;font-size:0.8rem;">🔵 ตอบกลับแล้ว</span>';
      } else {
        statusBadge = `<span class="status-badge">${m.status}</span>`;
      }
      
      const dateText = formatDateAdmin(m.date);
      
      return `
        <tr>
          <td>${statusBadge}</td>
          <td>
            <strong>${escapeHtmlAdmin(m.name)}</strong>
            <div style="font-size:0.8rem;color:#666;">${escapeHtmlAdmin(m.email)}</div>
          </td>
          <td style="max-width:240px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">
            <strong>${escapeHtmlAdmin(m.subject)}</strong>
            ${m.notes ? `<div style="font-size:0.75rem;color:#d4af37;">📝 โน้ต: ${escapeHtmlAdmin(m.notes)}</div>` : ''}
          </td>
          <td>${dateText}</td>
          <td>
            <div class="actions">
              <button class="btn btn-outline btn-sm" onclick="openMessageDetails('${m.id}')" title="ดูข้อความ">👁️ ดูข้อความ</button>
            </div>
          </td>
        </tr>
      `;
    }).join('');
  }

            filterMessages();
          }

  function initClassicEditor(textareaId) {
    const textarea = document.getElementById(textareaId);
    if (!textarea) return null;
    if (window.classicEditors && window.classicEditors[textareaId]) {
      return window.classicEditors[textareaId];
    }
    const wrapper = document.createElement('div');
    wrapper.className = 'classic-editor-wrapper';
    const toolbar = document.createElement('div');
    toolbar.className = 'classic-editor-toolbar';
    // Format Block Dropdown
    const formatSelect = document.createElement('select');
    formatSelect.className = 'classic-editor-select';
    formatSelect.innerHTML = `
      <option value="p">Normal text</option>
      <option value="h2">Heading 2</option>
      <option value="h3">Heading 3</option>
    `;
    formatSelect.onchange = function() {
      if (isSourceMode) return;
      document.execCommand('formatBlock', false, formatSelect.value);
      syncContent();
    };
    toolbar.appendChild(formatSelect);
    // Bold Button
    const boldBtn = createToolbarBtn('B', 'หนา (Bold)', () => {
      document.execCommand('bold', false, null);
    });
    toolbar.appendChild(boldBtn);
    // Italic Button
    const italicBtn = createToolbarBtn('I', 'เอียง (Italic)', () => {
      document.execCommand('italic', false, null);
    });
    italicBtn.style.fontStyle = 'italic';
    toolbar.appendChild(italicBtn);
    // Underline Button
    const underlineBtn = createToolbarBtn('U', 'ขีดเส้นใต้ (Underline)', () => {
      document.execCommand('underline', false, null);
    });
    underlineBtn.style.textDecoration = 'underline';
    toolbar.appendChild(underlineBtn);
    toolbar.appendChild(createDivider());
    // Color Picker
    const colorPicker = document.createElement('input');
    colorPicker.type = 'color';
    colorPicker.className = 'classic-editor-color-picker';
    colorPicker.title = 'สีข้อความ';
    colorPicker.value = '#000000';
    colorPicker.oninput = function() {
      if (isSourceMode) return;
      document.execCommand('foreColor', false, colorPicker.value);
      syncContent();
    };
    toolbar.appendChild(colorPicker);
    toolbar.appendChild(createDivider());
    // Link Button
    const linkBtn = createToolbarBtn('🔗', 'แทรกลิงก์ (Insert Link)', () => {
      const url = prompt('ระบุ URL ลิงก์ที่ต้องการแทรก (เช่น https://example.com):');
      if (url) {
        document.execCommand('createLink', false, url);
      }
    });
    toolbar.appendChild(linkBtn);
// Image Button
    const imgBtn = createToolbarBtn('🖼️', 'แทรกรูปภาพ (Insert Image)', () => {
      const option = confirm('ต้องการอัปโหลดรูปภาพใหม่จากคอมพิวเตอร์ของคุณหรือไม่?\n\n(กด OK เพื่อเลือกไฟล์รูปภาพ / กด Cancel เพื่อใส่เป็นลิงก์ URL แทน)');
      if (option) {
        const fileInput = document.createElement('input');
        fileInput.type = 'file';
        fileInput.accept = 'image/*';
        fileInput.style.display = 'none';
        
        fileInput.onchange = function(e) {
          const file = fileInput.files[0];

  // Helpers to clean up markdown and convert to HTML or Plain Text
  function convertMarkdownToHtml(text) {
    if (!text) return '';
    let html = text;
    
    // Remove ```html and ``` wraps if present
    html = html.replace(/```html\s*([\s\S]*?)\s*```/gi, '$1');
    html = html.replace(/```\s*([\s\S]*?)\s*```/gi, '$1');
    
    // Check if it already looks like HTML (contains paragraph or heading tags)
    const hasHtml = /<p>|<br>|<strong>|<li>|<h[1-6]>/i.test(html);
    if (hasHtml) {
      return html.trim();
    }
    
    // Escape HTML special characters before parsing markdown, to be safe
    html = escapeHtmlAdmin(html);
    
    // Parse Bold **text**
    html = html.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
    
    // Parse Italic *text*
    html = html.replace(/\*(.*?)\*/g, '<em>$1</em>');
    
    // Parse Headers
    html = html.replace(/^### (.*?)$/gm, '<h3>$1</h3>');
    html = html.replace(/^## (.*?)$/gm, '<h2>$1</h2>');
    html = html.replace(/^# (.*?)$/gm, '<h1>$1</h1>');
    
    // Parse List Items
    html = html.replace(/^\s*[-*]\s+(.*?)$/gm, '<li>$1</li>');
    
    // Parse Links [text](url)
    html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank">$1</a>');
    
    // Group paragraphs and list blocks
    const linesOrParagraphs = html.split(/\n\n+/);
    html = linesOrParagraphs.map(p => {
      p = p.trim();
      if (!p) return '';
      if (p.startsWith('<h') || p.startsWith('<li')) return p;
      if (p.includes('<li>')) {
        return '<ul>' + p + '</ul>';
      }
      return '<p>' + p.replace(/\n/g, '<br>') + '</p>';
    }).filter(Boolean).join('');
    
    return html;
  }
  function cleanPlainText(text) {
    if (!text) return '';
    let clean = text;
    
    // Strip markdown formatting symbols
    clean = clean.replace(/\*\*/g, '');
    clean = clean.replace(/\*/g, '');
    clean = clean.replace(/_([^_]+)_/g, '$1');
    clean = clean.replace(/^#+\s+/gm, '');
    clean = clean.replace(/^\s*[-*+]\s+/gm, '• ');
    
    // Strip HTML tags if any were accidentally generated
    clean = clean.replace(/<[^>]*>/g, '');
    return clean.trim();
  }

              <span class="news-date" style="font-size:0.8rem; color: var(--text-muted);">📅 เผยแพร่เมื่อ: ${formatDateHome(u.date)}</span>
              <span style="font-size:0.8rem; color: var(--gold-dark); font-weight: 600;">อ่านเพิ่มเติม ➔</span>
            </div>
          </div>
        </div>
      `;
    }).join('');
  }
  function openPublicUpdateDetails(id) {
    const u = (window.allUpdates || []).find(item => item.id === id);
    if (!u) return;
    document.getElementById('publicUpdateModalTitle').textContent = u.title;
    document.getElementById('publicUpdateModalDate').innerHTML = `📅 เผยแพร่เมื่อ: ${formatDateHome(u.date)}`;
    
    // Insert raw HTML as the layout configured by the editor should be fully respected
    document.getElementById('publicUpdateModalContent').innerHTML = u.content || '';
    const modal = document.getElementById('publicUpdateModal');
    modal.classList.add('open');
    document.body.style.overflow = 'hidden';
    // Hook click outside modal to close public update details modal
    modal.onclick = function(e) {
      if (e.target === modal) {
        closePublicUpdateModal();
      }
    };
  }
  function closePublicUpdateModal() {
    document.getElementById('publicUpdateModal').classList.remove('open');
    document.body.style.overflow = '';
  }
</script>
